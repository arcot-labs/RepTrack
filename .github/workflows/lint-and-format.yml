name: Maintenance / Lint and Format (Reusable)

on:
    workflow_call:

permissions: {}

jobs:
    lint-and-format:
        name: Lint and Format
        runs-on: self-hosted
        permissions:
            contents: write
        steps:
            - name: set cache dirs
              run: |
                  echo "PNPM_STORE_DIR=$HOME/.cache/pnpm/store" >> $GITHUB_ENV
                  echo "UV_CACHE_DIR=$HOME/.cache/uv" >> $GITHUB_ENV

            - name: checkout # zizmor: ignore[artipacked] - credentials needed for push
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: stage

            - name: setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              with:
                  version: latest

            - name: setup node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 'lts/*'
                  check-latest: true

            - name: set pnpm config
              run: |
                  mkdir -p "$PNPM_STORE_DIR"
                  pnpm config set store-dir "$PNPM_STORE_DIR"
                  pnpm config list

            - name: cache pnpm store
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ env.PNPM_STORE_DIR }}
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml', 'client/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-

            - name: install deps - base
              run: pnpm i --frozen-lockfile --ignore-scripts

            - name: install deps - client
              working-directory: client
              run: pnpm i --frozen-lockfile

            - name: setup uv
              uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  working-directory: server
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: install deps - server
              working-directory: server
              run: uv sync

            - name: lint & format
              run: |
                  pnpm run lint
                  pnpm run format

            - name: commit & push
              run: |
                  if [[ -n "$(git status --porcelain)" ]]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add .
                    git status
                    git commit -m "chore: lint & format after PR merge"
                    git status
                    git push
                  else
                    echo "No linting or formatting changes to commit"
                  fi
