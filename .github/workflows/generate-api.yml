name: Maintenance / Generate API Client after PR Merge

on:
    pull_request:
        branches:
            - stage
        types:
            - closed

permissions:
    contents: write

concurrency:
    group: generate-api
    cancel-in-progress: true

jobs:
    generate-api:
        name: Generate API Client
        if: github.event.pull_request.merged == true
        runs-on: self-hosted
        environment: stage
        steps:
            - name: set cache dirs
              run: |
                  echo "PNPM_STORE_DIR=$HOME/.cache/pnpm/store" >> $GITHUB_ENV
                  echo "UV_CACHE_DIR=$HOME/.cache/uv" >> $GITHUB_ENV

            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}

            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'
                  cache: 'pnpm'
                  cache-dependency-path: client/pnpm-lock.yaml

            - name: setup pnpm
              uses: pnpm/action-setup@v5

            - name: set pnpm config
              run: |
                  pnpm config set store-dir "$PNPM_STORE_DIR"
                  pnpm config list

            - name: install deps - client
              working-directory: client
              run: pnpm i --frozen-lockfile

            - name: setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  working-directory: server
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: install deps - server
              working-directory: server
              run: uv sync

            - name: create .env
              working-directory: config/env
              run: |
                  echo "ENV=test" >> .env
                  echo "LOG_LEVEL=debug" >> .env
                  echo "CLIENT_URL=" >> .env

                  echo "ADMIN__USERNAME=${{ secrets.ADMIN__USERNAME }}" >> .env
                  echo "ADMIN__EMAIL=${{ secrets.ADMIN__EMAIL }}" >> .env
                  echo "ADMIN__FIRST_NAME=${{ secrets.ADMIN__FIRST_NAME }}" >> .env
                  echo "ADMIN__LAST_NAME=${{ secrets.ADMIN__LAST_NAME }}" >> .env
                  echo "ADMIN__PASSWORD=${{ secrets.ADMIN__PASSWORD }}" >> .env

                  echo "JWT__SECRET_KEY=${{ secrets.JWT__SECRET_KEY }}" >> .env
                  echo "JWT__ALGORITHM=${{ secrets.JWT__ALGORITHM }}" >> .env
                  echo "JWT__ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.JWT__ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env
                  echo "JWT__REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.JWT__REFRESH_TOKEN_EXPIRE_DAYS }}" >> .env

                  echo "DB__HOST=" >> .env
                  echo "DB__PORT=0" >> .env
                  echo "DB__NAME=" >> .env
                  echo "DB__USER=" >> .env
                  echo "DB__PASSWORD=" >> .env

                  echo "EMAIL__BACKEND=console" >> .env

                  echo "GH__BACKEND=console" >> .env

                  echo "MS__HOST=" >> .env
                  echo "MS__PORT=0" >> .env
                  echo "MS__MASTER_KEY=" >> .env

            - name: generate api client
              working-directory: scripts
              run: ./generate_api.sh -f

            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4

            - name: build client image
              uses: docker/build-push-action@v7
              with:
                  context: client
                  target: build
                  push: false
                  build-args: |
                      VITE_ENV=ci
                      VITE_IMAGE_TAG=ci-tag
                      VITE_API_URL=https://api.example.com

            - name: commit & push
              run: |
                  if [[ -n "$(git status --porcelain)" ]]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add .
                    git status
                    git commit -m "chore: update generated API client after PR merge"
                    git status
                    git push
                  else
                    echo "No changes to commit"
                  fi
