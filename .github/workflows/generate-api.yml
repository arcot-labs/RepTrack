name: Maintenance / Generate API Client (Reusable)

on:
    workflow_call:
        secrets:
            KEYCHAIN_PASSWORD:
                required: true

permissions: {}

jobs:
    generate-api:
        name: Generate API Client
        runs-on: self-hosted
        environment: stage
        permissions:
            contents: write
        steps:
            - name: set cache dirs
              run: |
                  echo "PNPM_STORE_DIR=$HOME/.cache/pnpm/store" >> $GITHUB_ENV
                  echo "UV_CACHE_DIR=$HOME/.cache/uv" >> $GITHUB_ENV

            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout # zizmor: ignore[artipacked] - credentials needed for push
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: stage

            - name: setup pnpm
              uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
              with:
                  version: latest

            - name: setup node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 'lts/*'
                  check-latest: true

            - name: set pnpm config
              run: |
                  mkdir -p "$PNPM_STORE_DIR"
                  pnpm config set store-dir "$PNPM_STORE_DIR"
                  pnpm config list

            - name: cache pnpm store
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ env.PNPM_STORE_DIR }}
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml', 'client/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-

            - name: install deps - client
              working-directory: client
              run: pnpm i --frozen-lockfile

            - name: setup uv
              uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  working-directory: server
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: install deps - server
              working-directory: server
              run: uv sync

            - name: create .env
              working-directory: config/env
              run: |
                  echo "ENV=test" >> .env
                  echo "LOG_LEVEL=debug" >> .env
                  echo "CLIENT_URL=" >> .env

                  echo "ADMIN__USERNAME=admin" >> .env
                  echo "ADMIN__EMAIL=admin@example.com" >> .env
                  echo "ADMIN__FIRST_NAME=Admin" >> .env
                  echo "ADMIN__LAST_NAME=User" >> .env
                  echo "ADMIN__PASSWORD=password" >> .env

                  echo "JWT__SECRET_KEY=super-long-and-secure-secret-key" >> .env
                  echo "JWT__ALGORITHM=HS256" >> .env
                  echo "JWT__ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
                  echo "JWT__REFRESH_TOKEN_EXPIRE_DAYS=7" >> .env

                  echo "DB__HOST=" >> .env
                  echo "DB__PORT=0" >> .env
                  echo "DB__NAME=" >> .env
                  echo "DB__USER=" >> .env
                  echo "DB__PASSWORD=" >> .env

                  echo "EMAIL__BACKEND=console" >> .env

                  echo "GH__BACKEND=console" >> .env

                  echo "MS__HOST=" >> .env
                  echo "MS__PORT=0" >> .env
                  echo "MS__MASTER_KEY=" >> .env

            - name: generate api client
              working-directory: scripts
              run: ./generate_api.sh -f

            - name: set up docker buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: build client image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              with:
                  context: client
                  target: build
                  push: false
                  build-args: |
                      VITE_ENV=ci
                      VITE_IMAGE_TAG=ci-tag
                      VITE_API_URL=https://api.example.com

            - name: commit & push
              run: |
                  if [[ -n "$(git status --porcelain)" ]]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"

                    git add .
                    git status
                    git commit -m "chore: update generated API client after PR merge"
                    git status
                    git push
                  else
                    echo "No changes to commit"
                  fi
