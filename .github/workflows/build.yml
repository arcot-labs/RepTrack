name: CI / Build Client and Server Images

on:
    workflow_dispatch:
    pull_request_target:
        branches:
            - stage
            - main

permissions:
    contents: none

jobs:
    build-client:
        name: Build Client Image
        runs-on: self-hosted
        environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
        steps:
            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}

            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4

            - name: build client image
              uses: docker/build-push-action@v7
              with:
                  context: client
                  target: build
                  push: false
                  build-args: |
                      VITE_ENV=ci
                      VITE_IMAGE_TAG=ci-tag
                      VITE_API_URL=https://api.example.com

    build-server:
        name: Build Server Image
        runs-on: self-hosted
        environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
        steps:
            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}

            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4

            - name: build server image
              uses: docker/build-push-action@v7
              with:
                  context: server
                  target: base
                  push: false
