name: CI / Build Client and Server Images

on:
    workflow_dispatch:
    pull_request:
        branches:
            - stage
            - main

permissions: {}

jobs:
    build-client:
        name: Build Client Image
        runs-on: self-hosted
        environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
        steps:
            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}
                  persist-credentials: false

            - name: set up docker buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: build client image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              with:
                  context: client
                  target: build
                  push: false
                  build-args: |
                      VITE_ENV=ci
                      VITE_IMAGE_TAG=ci-tag
                      VITE_API_URL=https://api.example.com

    build-server:
        name: Build Server Image
        runs-on: self-hosted
        environment: ${{ github.base_ref == 'main' && 'prod' || github.base_ref }}
        steps:
            - name: unlock keychain
              if: runner.os == 'macOS'
              run: security unlock-keychain -p ${{ secrets.KEYCHAIN_PASSWORD }} login.keychain

            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}
                  persist-credentials: false

            - name: set up docker buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: build server image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              with:
                  context: server
                  target: base
                  push: false
