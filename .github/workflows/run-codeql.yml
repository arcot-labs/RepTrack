name: Security / Run CodeQL Analysis

on:
    workflow_dispatch:
    push:
        branches:
            - stage
        paths:
            - .github/workflows/*.yml
            - client/public/**
            - client/src/**
            - client/package.json
            - client/pnpm-lock.yaml
            - client/pnpm-workspace.yaml
            - client/tsconfig*.json
            - client/vite.config.ts
            - client/index.html
            - server/app/**
            - server/pyproject.toml
            - server/uv.lock
    schedule:
        - cron: '30 6 * * 2'

concurrency:
    group: run-codeql-${{ github.ref_name }}
    cancel-in-progress: true

permissions: {}

jobs:
    run-codeql:
        name: Run CodeQL Analysis for ${{ matrix.language }}${{ matrix.project && format(' ({0})', matrix.project) || '' }}
        runs-on: self-hosted
        permissions:
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: actions
                    - language: typescript
                      project: client
                    - language: python
                      project: server
        steps:
            - name: set cache dir
              run: echo "PNPM_STORE_DIR=$HOME/.cache/pnpm/store" >> $GITHUB_ENV

            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ github.ref_name }}
                  persist-credentials: false

            - name: setup pnpm - typescript
              if: matrix.language == 'typescript'
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              with:
                  version: latest

            - name: setup node - typescript
              if: matrix.language == 'typescript'
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 'lts/*'
                  check-latest: true

            - name: set pnpm config - typescript
              if: matrix.language == 'typescript'
              run: |
                  mkdir -p "$PNPM_STORE_DIR"
                  pnpm config set store-dir "$PNPM_STORE_DIR"
                  pnpm config list

            - name: cache pnpm store - typescript
              if: matrix.language == 'typescript'
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ env.PNPM_STORE_DIR }}
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('client/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-

            - name: initialize codeql - actions
              if: matrix.language == 'actions'
              uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  languages: actions
                  build-mode: none
                  config: |
                      paths:
                      - '.github/workflows/*.yml'

            - name: initialize codeql - typescript
              if: matrix.language == 'typescript'
              uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  languages: typescript
                  build-mode: none
                  config: |
                      paths:
                      - '${{ matrix.project }}/src/**/*.ts'

            - name: initialize codeql - python
              if: matrix.language == 'python'
              uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  languages: python
                  build-mode: none
                  config: |
                      paths:
                         - '${{ matrix.project }}/app/**/*.py'

            - name: install deps, build - typescript
              if: matrix.language == 'typescript'
              working-directory: ${{ matrix.project }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  pnpm i --frozen-lockfile
                  pnpm run build

            - name: run codeql
              uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
              with:
                  category: '/language:${{matrix.language}}'
