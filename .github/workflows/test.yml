name: CI / Test Client and Server

on:
    workflow_dispatch:
    pull_request:
        branches:
            - stage
            - main

permissions: {}

jobs:
    test-client:
        name: Test Client
        runs-on: self-hosted
        steps:
            - name: set cache dirs
              run: echo "PNPM_STORE_DIR=$HOME/.cache/pnpm/store" >> $GITHUB_ENV

            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}
                  persist-credentials: false

            - name: setup pnpm
              uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
              with:
                  version: latest

            - name: setup node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 'lts/*'
                  check-latest: true

            - name: set pnpm config
              run: |
                  mkdir -p "$PNPM_STORE_DIR"
                  pnpm config set store-dir "$PNPM_STORE_DIR"
                  pnpm config list

            - name: cache pnpm store
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ env.PNPM_STORE_DIR }}
                  key: ${{ runner.os }}-pnpm-${{ hashFiles('client/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-

            - name: install deps
              working-directory: client
              run: pnpm i --frozen-lockfile

            - name: run tests with coverage
              working-directory: client
              run: pnpm run test:coverage

            - name: upload coverage
              uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
              with:
                  directory: client
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: arcot-labs/RepTrack

    test-server:
        name: Test Server
        runs-on: self-hosted
        steps:
            - name: set cache dir
              run: echo "UV_CACHE_DIR=$HOME/.cache/uv" >> $GITHUB_ENV

            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.ref_name }}
                  persist-credentials: false

            - name: setup uv
              uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
              with:
                  working-directory: server
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: install deps
              working-directory: server
              run: uv sync

            - name: run deptry
              working-directory: server
              run: make deptry

            - name: run type checks
              working-directory: server
              run: make check

            - name: run tests with coverage
              working-directory: server
              run: make cov-xml

            - name: upload coverage
              uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
              with:
                  directory: server
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: arcot-labs/RepTrack
